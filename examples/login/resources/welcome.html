<html>
    <head>
        <title>Welcome</title>
        <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; color: #333; }
            h1 { color: #333; }
            .card { background: white; border-radius: 8px; padding: 20px; border: 1px solid #ddd; margin-bottom: 16px; }
            .card { overflow-x: auto; }
            .card table { width: 100%; table-layout: fixed; }
            .card td { vertical-align: top; padding: 4px 8px; font-size: 14px; }
            .card td:first-child { width: 12ch; font-weight: bold; white-space: nowrap; }
            .card td:last-child { overflow-wrap: anywhere; word-break: break-all; }
            a { color: #1976d2; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .links { margin-top: 16px; }
        </style>
    </head>
    <body>
        <h1>Welcome</h1>
        <div class="card">
            <table>
                <tr><td>Actor header</td><td>{{ .Raw }}</td></tr>
                <tr><td>Parsed actor</td><td>{{ .Actor }}</td></tr>
                <tr><td>Admin?</td><td>{{ if .Actor.IsAdmin }}YES, you're all powerful{{ else }}no{{ end }}</td></tr>
                <tr><td>Manager?</td><td>{{ if .Actor.IsManager }}YES, you rule{{ else }}no{{ end }}</td></tr>
                <tr><td>User?</td><td>{{ if .Actor.IsUser }}YES{{ else }}no{{ end }}</td></tr>
            </table>
        </div>
        <div class="links">
            <a href="admin-only">For admins only</a> | <a href="manager-only">For managers only</a>
            &nbsp;&middot;&nbsp;
            <a href="logout">Log out</a>
        </div>
    </body>
</html>
