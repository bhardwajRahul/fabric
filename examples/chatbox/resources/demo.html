<!DOCTYPE html>
<html>
<head>
    <title>Chatbox Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .chat-box { background: white; border-radius: 8px; padding: 20px; min-height: 300px; max-height: 500px; overflow-y: auto; border: 1px solid #ddd; margin-bottom: 16px; }
        .message { margin: 8px 0; padding: 8px 12px; border-radius: 6px; }
        .user { background: #e3f2fd; text-align: right; }
        .assistant { background: #f5f5f5; }
        .tool { background: #fff3e0; font-family: monospace; font-size: 0.9em; }
        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        .input-row button { padding: 10px 24px; background: #1976d2; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .input-row button:hover { background: #1565c0; }
        .input-row button:disabled { background: #999; cursor: not-allowed; }
        .info { color: #666; font-size: 0.9em; margin-top: 16px; }
        .examples { margin: 16px 0; }
        .examples button { margin: 4px; padding: 6px 12px; background: #e8e8e8; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .examples button:hover { background: #ddd; }
    </style>
</head>
<body>
    <h1>Chatbox Demo</h1>
    <p>This demo uses the <strong>LLM core service</strong> with the <strong>Chatbox</strong> as a demo provider and the <strong>Calculator</strong> as a tool.</p>

    <div class="examples">
        Try:
        <button onclick="ask('What is 6 times 7?')">What is 6 times 7?</button>
        <button onclick="ask('How much is 100 divided by 4?')">100 / 4</button>
        <button onclick="ask('Calculate 15 plus 28')">15 + 28</button>
        <button onclick="ask('What is 99 minus 42?')">99 - 42</button>
        <button onclick="ask('Hello!')">Hello!</button>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-row">
        <input type="text" id="input" placeholder="Ask a math question..." onkeydown="if(event.key==='Enter')send()">
        <button id="sendBtn" onclick="send()">Send</button>
    </div>

    <div class="info">
        The Chatbox demo provider pattern-matches your question, calls the Calculator microservice via the LLM tool-calling flow, and returns the result. No real LLM API key is needed.
    </div>

    <script>
        function addMessage(role, content) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = content;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function ask(text) {
            document.getElementById('input').value = text;
            send();
        }

        async function send() {
            const input = document.getElementById('input');
            const btn = document.getElementById('sendBtn');
            const message = input.value.trim();
            if (!message) return;

            addMessage('user', message);
            input.value = '';
            btn.disabled = true;

            try {
                const resp = await fetch('/chatbox.example/demo', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'message=' + encodeURIComponent(message)
                });
                if (!resp.ok) {
                    const text = await resp.text();
                    addMessage('assistant', 'Error: ' + text);
                    return;
                }
                const messages = await resp.json();
                for (const msg of messages) {
                    addMessage(msg.role, msg.content);
                }
            } catch (err) {
                addMessage('assistant', 'Error: ' + err.message);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
