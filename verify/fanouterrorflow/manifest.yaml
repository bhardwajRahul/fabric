general:
  name: fanouterrorflow
  hostname: fanouterrorflow.verify
  description: "fanouterrorflow.verify exercises OnError + fan-out: A -> {B, C, D} -> E with B onError -> Handler -> E."
  package: github.com/microbus-io/fabric/verify/fanouterrorflow
  frameworkVersion: 1.28.0
  modifiedAt: "2026-05-14T15:33:30Z"

tasks:
  TaskA:
    signature: TaskA() (started bool)
    description: TaskA is the fan-out source.
    route: :428/task-a
  TaskB:
    signature: TaskB(started bool) (markB bool)
    description: TaskB always errors, triggering its onError transition.
    route: :428/task-b
  TaskC:
    signature: TaskC(started bool) (markC bool)
    description: TaskC is a normal sibling.
    route: :428/task-c
  TaskD:
    signature: TaskD(started bool) (markD bool)
    description: TaskD is a normal sibling.
    route: :428/task-d
  Handler:
    signature: Handler(onErr *errors.TracedError) (handled bool)
    description: Handler handles TaskB's error.
    route: :428/handler
  TaskE:
    signature: TaskE(handled bool, markB bool, markC bool, markD bool) (recovered bool)
    description: TaskE is the fan-in target.
    route: :428/task-e

workflows:
  FanOutError:
    signature: FanOutError() (recovered bool)
    description: FanOutError defines the graph A -> {B, C, D} -> E with B onError -> Handler -> E.
    route: :428/fan-out-error
