general:
  name: docextractionflow
  hostname: docextractionflow.verify
  description: docextractionflow.verify simulates a nested forEach document-extraction pipeline with per-chunk latency, a 5% failure rate, and bounded retry.
  package: github.com/microbus-io/fabric/verify/docextractionflow
  frameworkVersion: 1.28.0
  modifiedAt: "2026-05-16T05:39:15Z"

tasks:
  ScanPDF:
    signature: ScanPDF(pdf []byte) (pageImages [][]byte, pageCount int)
    description: ScanPDF rasterizes a PDF into page images (forEach source over pages).
    route: :428/scan-pdf
  IdentifyChunks:
    signature: IdentifyChunks(page []byte) (chunks []Rectangle)
    description: IdentifyChunks detects chunk rectangles on a page (inner forEach source).
    route: :428/identify-chunks
  TranscribeChunk:
    signature: TranscribeChunk(page []byte, chunk Rectangle) (listTranscriptions []string)
    description: TranscribeChunk OCRs one chunk, with simulated latency and a 5% failure rate retried with backoff.
    route: :428/transcribe-chunk
  JoinPageTranscriptions:
    signature: JoinPageTranscriptions(listTranscriptions []string) (listPageTexts []string)
    description: JoinPageTranscriptions is the inner fan-in over a page's chunks.
    route: :428/join-page-transcriptions
  JoinDocTranscriptions:
    signature: JoinDocTranscriptions(listPageTexts []string) (docTranscription string)
    description: JoinDocTranscriptions is the outer fan-in over all pages.
    route: :428/join-doc-transcriptions

workflows:
  DocExtraction:
    signature: DocExtraction(pdf []byte) (docTranscription string, pageCount int)
    description: DocExtraction defines ScanPDF -forEach-> IdentifyChunks -forEach-> TranscribeChunk -> JoinPageTranscriptions -> JoinDocTranscriptions.
    route: :428/doc-extraction
