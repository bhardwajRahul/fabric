    signature: A() (sumExecutedOut int)
    description: A is a normal fan-out branch.
    route: :428/a
  B:
    signature: B(resumed bool) (sumExecutedOut int)
    description: B is the interrupting fan-out branch.
    route: :428/b
  C:
    signature: C() (sumExecutedOut int)
    description: C is a normal fan-out branch.
    route: :428/c
  J:
    signature: J(sumExecuted int) (totalExecuted int)
    description: J is the fan-in target.
    route: :428/j

workflows:
  InterruptedFanOut:
    signature: InterruptedFanOut() (sumExecuted int, totalExecuted int)
