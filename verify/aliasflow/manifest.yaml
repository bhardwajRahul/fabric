general:
  name: aliasflow
  hostname: aliasflow.verify
  description: "aliasflow.verify exercises a workflow graph in which the same task URL appears at two distinct positions under two distinct node names."
  package: github.com/microbus-io/fabric/verify/aliasflow
  frameworkVersion: 1.28.0
  modifiedAt: "2026-05-14T19:00:00Z"

tasks:
  TaskS:
    signature: TaskS(branch string) (branchOut string)
    description: TaskS dispatches to either the long path (a -> b -> c) or the alternate path (bPrime -> d) via flow.Goto.
    route: :428/task-s
  TaskA:
    signature: TaskA(path string) (pathOut string)
    description: TaskA appends "A" to the path.
    route: :428/task-a
  TaskB:
    signature: TaskB(path string) (pathOut string)
    description: TaskB appends "B" to the path. Reused at two graph positions under names "b" and "bPrime".
    route: :428/task-b
  TaskC:
    signature: TaskC(path string) (pathOut string)
    description: TaskC appends "C" to the path.
    route: :428/task-c
  TaskD:
    signature: TaskD(path string) (pathOut string)
    description: TaskD appends "D" to the path.
    route: :428/task-d

workflows:
  Alias:
    signature: Alias(branch string) (path string)
    description: Alias defines the graph s -> a -> b -> c -> END with an alternate Goto-driven path s -> bPrime -> d -> END. Nodes "b" and "bPrime" share the same task URL.
    route: :428/alias
