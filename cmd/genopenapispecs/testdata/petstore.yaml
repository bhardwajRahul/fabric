openapi: 3.0.3
info:
  title: Pet Store
  version: 1.0.0
  description: A sample API for exercising the OpenAPI importer.
servers:
  - url: https://api.petstore.example/v1
security:
  - apiKey: []
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
  parameters:
    PetId:
      name: petId
      in: path
      required: true
      description: The unique identifier of the pet.
      schema:
        type: integer
        format: int64
  responses:
    PetResponse:
      description: A single pet.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Pet'
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        tag:
          type: string
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return.
          schema:
            type: integer
            format: int32
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: A list of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPet'
      responses:
        '201':
          description: The created pet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /pets/{petId}:
    parameters:
      - $ref: '#/components/parameters/PetId'
    get:
      operationId: getPetById
      summary: Get a pet by ID
      responses:
        '200':
          $ref: '#/components/responses/PetResponse'
        '404':
          description: Pet not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deletePet
      summary: Delete a pet
      responses:
        '204':
          description: Deleted.
  /pets/{petId}/avatar:
    get:
      operationId: getPetAvatar
      summary: Download the pet's avatar image
      parameters:
        - $ref: '#/components/parameters/PetId'
      responses:
        '200':
          description: The avatar.
          content:
            image/png: {}
  /pets/search:
    get:
      summary: Search pets
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: X-Trace
          in: header
          schema:
            type: string
        - name: session
          in: cookie
          schema:
            type: string
      responses:
        '200':
          description: Matching pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
