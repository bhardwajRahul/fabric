general:
  name: ClaudeLLM
  hostname: claude.llm.core
  description: The Claude LLM provider microservice implements the Turn endpoint for the Anthropic Claude API.
  package: github.com/microbus-io/fabric/coreservices/claudellm
  frameworkVersion: 1.26.0
  cloud: api.anthropic.com
  modifiedAt: "2026-04-05T10:00:00Z"

downstream:
  - hostname: http.egress.core
    package: github.com/microbus-io/fabric/coreservices/httpegress

configs:
  BaseURL:
    signature: BaseURL() (baseURL string)
    description: BaseURL is the base URL of the Claude API.
    validation: url
    default: https://api.anthropic.com
    secret: false
    callback: false
  APIKey:
    signature: APIKey() (apiKey string)
    description: APIKey is the API key for the Claude API.
    secret: true
    callback: false
  Model:
    signature: Model() (model string)
    description: Model is the Claude model identifier to use.
    default: claude-haiku-4-5
    secret: false
    callback: false

functions:
  Turn:
    signature: Turn(messages []Message, tools []ToolDef) (completion *TurnCompletion)
    description: Turn executes a single LLM turn using the Claude provider.
    method: POST
    route: :444/turn
