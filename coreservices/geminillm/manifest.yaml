general:
  name: GeminiLLM
  hostname: gemini.llm.core
  description: The Gemini LLM provider microservice implements the Turn endpoint for the Google Gemini API.
  package: github.com/microbus-io/fabric/coreservices/geminillm
  frameworkVersion: 1.26.0
  cloud: generativelanguage.googleapis.com
  modifiedAt: "2026-04-05T10:00:00Z"

downstream:
  - hostname: http.egress.core
    package: github.com/microbus-io/fabric/coreservices/httpegress

configs:
  BaseURL:
    signature: BaseURL() (baseURL string)
    description: BaseURL is the base URL of the Gemini API.
    validation: url
    default: https://generativelanguage.googleapis.com
    secret: false
    callback: false
  APIKey:
    signature: APIKey() (apiKey string)
    description: APIKey is the API key for the Gemini API.
    secret: true
    callback: false
  Model:
    signature: Model() (model string)
    description: Model is the Gemini model identifier to use.
    default: gemini-2.0-flash
    secret: false
    callback: false

functions:
  Turn:
    signature: Turn(messages []Message, tools []ToolDef) (completion *TurnCompletion)
    description: Turn executes a single LLM turn using the Gemini provider.
    method: POST
    route: :444/turn
