general:
  name: MCPPortal
  hostname: mcp.core
  description: The MCP portal exposes the bus's tools to LLM clients via the Model Context Protocol. Clients send JSON-RPC 2.0 envelopes to a single wire endpoint (POST //mcp:0); the service dispatches on the JSON-RPC method to handlers for initialize, tools/list, and tools/call.
  package: github.com/microbus-io/fabric/coreservices/mcpportal
  frameworkVersion: 1.28.0
  modifiedAt: "2026-05-02T03:54:31Z"

downstream:
  - hostname: openapiportal.core
    package: github.com/microbus-io/fabric/coreservices/openapiportal

webs:
  MCP:
    description: MCP is the JSON-RPC 2.0 wire endpoint for Model Context Protocol clients. Accepts a JSON-RPC envelope and dispatches on the `method` field to one of `initialize`, `tools/list`, or `tools/call`. Filtered by the caller's claims (the openapi portal's aggregate filters at source) and by the request's port.
    method: POST
    route: //mcp:0
