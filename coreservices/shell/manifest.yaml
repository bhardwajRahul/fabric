general:
  name: Shell
  hostname: shell.core
  description: Shell enables running shell commands on a host.
  package: github.com/microbus-io/fabric/coreservices/shell
  frameworkVersion: 1.28.0
  modifiedAt: "2026-05-02T03:54:31Z"
functions:
  Execute:
    signature: Execute(cmd string, workDir string, stdin string, envars map[string]string) (exitCode int, stdout string, stderr string)
    description: Execute runs a shell command on the host and returns the exit code, standard output, and standard error.
    method: POST
    route: :444/execute
configs:
  MaxOutputBytes:
    signature: MaxOutputBytes() (maxOutputBytes int)
    description: MaxOutputBytes caps the number of bytes retained from each of stdout and stderr. When a stream exceeds this cap, the head and tail are kept and the middle is elided with a marker.
    validation: int [1024,]
    default: 262144
