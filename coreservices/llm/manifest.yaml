general:
  name: LLM
  hostname: llm.core
  description: The LLM microservice bridges LLM tool-calling protocols with Microbus endpoint invocations.
  package: github.com/microbus-io/fabric/coreservices/llm
  frameworkVersion: 1.28.0
  modifiedAt: "2026-05-09T14:47:51Z"

configs:
  MaxToolRounds:
    signature: MaxToolRounds() (value int)
    description: MaxToolRounds is the maximum number of tool call round-trips per invocation.
    validation: int [1,50]
    default: 10

metrics:
  LLMTokens:
    signature: LLMTokens(value int, provider string, model string, direction string)
    description: LLMTokens counts tokens consumed per LLM turn
    kind: counter
    otelName: microbus_llm_tokens_total

functions:
  Chat:
    signature: Chat(provider string, model string, messages []Message, toolURLs []string, options *ChatOptions) (messagesOut []Message, usage Usage)
    description: |-
      Chat sends messages to an LLM with optional tools, looping through tool calls until the LLM returns a final answer.
      
      Input:
        - provider: provider is the hostname of the LLM provider microservice to use
        - model: model is the provider-specific model identifier
        - messages: messages is the conversation history to send to the LLM
        - toolURLs: toolURLs is the list of Microbus endpoint URLs exposed to the LLM
        - options: options configures tool-call rounds, max tokens, temperature (nil = defaults)
      
      Output:
        - messagesOut: messagesOut is the full conversation including new messages produced by the LLM
        - usage: usage is the aggregate token consumption across all turns
    method: POST
    route: :444/chat
  Turn:
    signature: Turn(model string, messages []Message, tools []Tool, options *TurnOptions) (content string, toolCalls []ToolCall, usage Usage)
    description: |-
      Turn executes a single LLM turn. On llm.core this returns 501 Not Implemented; the actual implementation lives in each provider microservice (claudellm, chatgptllm, geminillm).
      
      Input:
        - model: model is the provider-specific model identifier
        - messages: messages is the conversation history to send to the LLM
        - tools: tools is the resolved tool definitions with schemas
        - options: options configures max tokens and temperature (nil = provider defaults)
      
      Output:
        - content: content is the LLM's text response, if any
        - toolCalls: toolCalls is the list of tool calls requested by the LLM
        - usage: usage is the token consumption for this single turn
    method: POST
    route: :444/turn

tasks:
  InitChat:
    signature: InitChat(listMessages []Message, tools []Tool, options *ChatOptions) (maxToolRounds int, toolRounds int)
    description: InitChat validates inputs, resolves tool schemas from OpenAPI, and stores them in flow state.
    route: :428/init-chat
  CallLLM:
    signature: CallLLM(provider string, model string, listMessages []Message) (llmContent string, pendingToolCalls any, turnUsage Usage)
    description: CallLLM sends the current messages and tools to the LLM provider.
    route: :428/call-llm
  ProcessResponse:
    signature: ProcessResponse(llmContent string, turnUsage Usage, toolRounds int, maxToolRounds int) (listMessagesOut []Message, toolsRequested bool, toolRoundsOut int, usageOut Usage)
    description: ProcessResponse inspects the LLM response, accumulates usage, and routes to the next step.
    route: :428/process-response
  ExecuteTool:
    signature: ExecuteTool(toolExecuted bool) (toolExecutedOut bool)
    description: ExecuteTool executes a single tool call, identified by the currentTool forEach variable.
    route: :428/execute-tool

workflows:
  ChatLoop:
    signature: ChatLoop(provider string, model string, listMessages []Message, tools []Tool, options *ChatOptions) (listMessagesOut []Message, usage Usage)
    description: ChatLoop defines the workflow graph for multi-turn LLM conversations with tool calling.
    route: :428/chat-loop
