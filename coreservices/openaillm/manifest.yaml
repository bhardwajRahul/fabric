general:
  name: OpenAILLM
  hostname: openai.llm.core
  description: The OpenAI LLM provider microservice implements the Turn endpoint for the OpenAI Chat Completions API.
  package: github.com/microbus-io/fabric/coreservices/openaillm
  frameworkVersion: 1.26.0
  cloud: api.openai.com
  modifiedAt: "2026-04-05T10:00:00Z"

downstream:
  - hostname: http.egress.core
    package: github.com/microbus-io/fabric/coreservices/httpegress

configs:
  BaseURL:
    signature: BaseURL() (baseURL string)
    description: BaseURL is the base URL of the OpenAI API.
    validation: url
    default: https://api.openai.com
    secret: false
    callback: false
  APIKey:
    signature: APIKey() (apiKey string)
    description: APIKey is the API key for the OpenAI API.
    secret: true
    callback: false
  Model:
    signature: Model() (model string)
    description: Model is the OpenAI model identifier to use.
    default: gpt-4
    secret: false
    callback: false

functions:
  Turn:
    signature: Turn(messages []Message, tools []ToolDef) (completion *TurnCompletion)
    description: Turn executes a single LLM turn using the OpenAI provider.
    method: POST
    route: :444/turn
