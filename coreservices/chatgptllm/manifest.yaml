general:
  name: ChatGPTLLM
  hostname: chatgpt.llm.core
  description: The ChatGPT LLM provider microservice implements the Turn endpoint for the OpenAI Chat Completions API.
  package: github.com/microbus-io/fabric/coreservices/chatgptllm
  frameworkVersion: 1.28.0
  cloud: api.openai.com
  modifiedAt: "2026-05-03T00:00:00Z"

downstream:
  - hostname: http.egress.core
    package: github.com/microbus-io/fabric/coreservices/httpegress

configs:
  BaseURL:
    signature: BaseURL() (baseURL string)
    description: BaseURL is the base URL of the OpenAI API.
    validation: url
    default: https://api.openai.com
    secret: false
    callback: false
  APIKey:
    signature: APIKey() (apiKey string)
    description: APIKey is the API key for the OpenAI API.
    secret: true
    callback: false

functions:
  Turn:
    signature: Turn(model string, messages []Message, tools []Tool, options *TurnOptions) (content string, toolCalls []ToolCall, usage Usage)
    description: Turn executes a single LLM turn using the ChatGPT provider.
    method: POST
    route: :444/turn
