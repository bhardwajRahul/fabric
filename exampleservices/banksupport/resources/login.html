<!DOCTYPE html>
<html>
<head>
    <title>Bank Support - Sign In</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 420px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .card { background: white; border-radius: 8px; padding: 24px; border: 1px solid #ddd; }
        label { display: inline-block; width: 90px; font-weight: 500; }
        input[type="text"], input[type="password"] { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 240px; margin-bottom: 10px; }
        input[type="submit"] { padding: 10px 24px; background: #1976d2; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 8px; }
        input[type="submit"]:hover { background: #1565c0; }
        .denied { color: #c62828; margin-bottom: 12px; }
        .hint { color: #666; font-size: 0.9em; margin-top: 16px; }
    </style>
</head>
<body>
    <h1>Bank Support</h1>
    <div class="card">
        {{ if .Denied }}<div class="denied">Unknown customer. Try alice or bob.</div>{{ end }}
        <form method="POST">
            <div><label>Username</label><input type="text" name="u" value="{{ .U }}" autofocus></div>
            <div><label>Password</label><input type="password" name="p"></div>
            <input type="hidden" name="l" value="1">
            <div><label></label><input type="submit" value="Sign In"></div>
        </form>
        <div class="hint">Demo customers: <b>alice</b> (healthy balance) and <b>bob</b> (overdrawn). Any password works.</div>
    </div>
</body>
</html>
